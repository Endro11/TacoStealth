<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Dining room -->
  <rect width="1280" height="720" fill="#e9dcc7"/>
  <rect y="470" width="1280" height="250" fill="#9c6b3f"/>
  <rect y="470" width="1280" height="14" fill="#7d5530"/>
  <!-- wainscot -->
  <rect y="360" width="1280" height="110" fill="#d8c4a6"/>
  <rect y="356" width="1280" height="8" fill="#b9a079"/>
  <!-- window -->
  <rect x="120" y="120" width="320" height="220" fill="#8fc7e8"/>
  <rect x="110" y="110" width="340" height="240" fill="none" stroke="#5a4632" stroke-width="14"/>
  <line x1="280" y1="120" x2="280" y2="340" stroke="#5a4632" stroke-width="10"/>
  <line x1="120" y1="230" x2="440" y2="230" stroke="#5a4632" stroke-width="10"/>
  <!-- framed picture -->
  <rect x="820" y="150" width="200" height="150" fill="#caa15a" stroke="#6b4f2a" stroke-width="12"/>
  <circle cx="900" cy="220" r="34" fill="#e07b54"/>
  <rect x="940" y="210" width="60" height="70" fill="#5e8d5a"/>
  <!-- table -->
  <ellipse cx="640" cy="560" rx="360" ry="70" fill="#7a4a26"/>
  <rect x="300" y="540" width="680" height="40" fill="#8a5630"/>
  <rect x="350" y="560" width="24" height="120" fill="#5e3a1e"/>
  <rect x="906" y="560" width="24" height="120" fill="#5e3a1e"/>
  <!-- plates -->
  <ellipse cx="470" cy="545" rx="60" ry="20" fill="#f3efe6"/>
  <ellipse cx="640" cy="540" rx="60" ry="20" fill="#f3efe6"/>
  <ellipse cx="810" cy="545" rx="60" ry="20" fill="#f3efe6"/>
  <!-- chair backs -->
  <rect x="430" y="430" width="80" height="120" rx="10" fill="#6f4524"/>
  <rect x="770" y="430" width="80" height="120" rx="10" fill="#6f4524"/>
  <!-- potted plant -->
  <rect x="1090" y="430" width="90" height="120" fill="#b5552f"/>
  <path d="M1135 430 C1080 360 1080 300 1110 250 C1130 320 1150 320 1135 430 Z" fill="#3f7d3a"/>
  <path d="M1135 430 C1190 360 1200 300 1170 250 C1150 320 1130 330 1135 430 Z" fill="#4f9145"/>
</svg>
